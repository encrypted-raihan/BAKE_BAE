<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bake Bae</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>



:root {
  --brand-pink: #e94b7d;
  --brand-blue: #2f3e8f;
}
    * { margin: 0; padding: 0; box-sizing: border-box; }
      

body {
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  background: #fdf6ee;
}


/* MAIN BRAND */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 8vw, 5rem);
  letter-spacing: 3px;
}

/* SUBTEXT */
p {
  margin-top: 12px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  letter-spacing: 1px;
  opacity: 0.9;
}
    /* ===== VIDEO ===== */
.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;

  /* lightweight styling instead of heavy blur */
  filter: brightness(0.6) contrast(1.1);
  transform: scale(1.05);
  will-change: transform;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;

  background-image: url('https://www.transparenttextures.com/patterns/flour.png');
  opacity: 0.25;
  mix-blend-mode: soft-light;
  z-index: -1;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;

  background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.15;
}
.overlay {
  position: fixed;
  inset: 0;

  /* Layer 1: dark cinematic base (unchanged feel) */
  background:
    linear-gradient(
      rgba(60, 35, 15, 0.75),
      rgba(30, 15, 5, 0.85)
    ),

    /* Layer 2: subtle brand pink glow */
    radial-gradient(
      circle at 70% 30%,
      rgba(233, 75, 125, 0.12),
      transparent 60%
    ),

    /* Layer 3: subtle brand blue glow */
    radial-gradient(
      circle at 30% 70%,
      rgba(47, 62, 143, 0.12),
      transparent 60%
    );

  /* 🔥 Blur fix for low-quality video */
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);

  z-index: -1;
}
    /* ===== CONTENT ===== */
    .content {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 20px;
      animation: fadeIn 1.2s ease;
      
    }

h1 {
  letter-spacing: 6px;
  text-shadow: 0 4px 20px rgba(255, 200, 150, 0.3);
}

p {
  font-size: 1.3rem;
  color: #f3e2c7;
  opacity: 0.95;
}

    /* ===== BUTTON ===== */
.enter-btn {
  margin-top: 30px;
  padding: 14px 34px;
  border-radius: 50px;

   background: linear-gradient(135deg, var(--brand-pink), var(--brand-blue));
  color: white;

  font-weight: 500;
  letter-spacing: 2px;

  border: none;
  cursor: pointer;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.3),
    inset 0 2px 6px rgba(255,255,255,0.4);

  transition: all 0.3s ease;
}

.enter-btn:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow:
    0 14px 40px rgba(0,0,0,0.4),
    inset 0 2px 8px rgba(255,255,255,0.5);
}
.video-bg {
filter: brightness(0.55) contrast(1.1) saturate(1.2) sepia(0.2);
}
.video-bg.loaded {
  opacity: 1;
}

    .enter-btn.show {
      opacity: 1;
      transform: translateY(0);
    }

    .enter-btn:hover {
      background: #fff;
      color: #000;
    }

    .content h1,
.content p {
  animation: fadeIn 1.2s ease;
}
.content::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 200px;
  height: 100px;
  background: radial-gradient(circle, rgba(255, 200, 150, 0.2), transparent);
  filter: blur(40px);
}
@keyframes logoReveal {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateY(20px) scale(1); /* <-- stays lower */
  }
}

    /* ===== ANIMATION ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
.logo {
  filter:
    brightness(10)
    drop-shadow(0 0 25px rgba(255, 220, 180, 0.4))
    drop-shadow(0 0 60px rgba(255, 180, 120, 0.2));
  width: clamp(140px, 18vw, 240px);
  margin-bottom: 24px;

  opacity: 0;
  animation: logoReveal 1s ease forwards;
  animation-delay: 0.2s;

  filter:
    brightness(10)
    drop-shadow(0 0 25px rgba(233, 75, 125, 0.4))
    drop-shadow(0 0 60px rgba(47, 62, 143, 0.25));
}
h1 {
  background: linear-gradient(90deg, #fff, var(--brand-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
::selection {
  background: var(--brand-pink);
  color: white;
}

body.fade-out {
  opacity: 0;
  transition: opacity 1.2s ease;
}

.credit {
  position: fixed;
  bottom: 20px;
  left: 50%;

  display: flex;
  align-items: center;
  gap: 8px;

  font-size: 0.7rem;
  letter-spacing: 1.2px;
  text-transform: uppercase;

  color: rgba(255, 230, 200, 0.7);
  text-decoration: none;

  backdrop-filter: blur(6px);
  padding: 6px 12px;
  border-radius: 20px;

  background: rgba(255, 200, 150, 0.08);
  border: 1px solid rgba(255, 200, 150, 0.15);

  z-index: 10;

  opacity: 0;
  transform: translate(-50%, 10px); /* 🔥 key fix */
  animation: creditFade 1s ease forwards;
  animation-delay: 1.5s;

  transition: all 0.3s ease;
}
@keyframes creditFade {
  from {
    opacity: 0;
    transform: translate(-50%, 10px);
  }
  to {
    opacity: 1;
    transform: translate(-50%, 0);
  }
}
.credit img {
  height: 44px;
  opacity: 0.85;
}
.credit:hover {
  transform: translateY(-2px) scale(1.05);
  color: rgba(255, 255, 255, 0.95);
  border-color: rgba(255, 220, 180, 0.4);
}
.credit {
  cursor: pointer;
}

.credit:hover img {
  filter: brightness(1.5);
}
/* ===== INTRO LOADER ===== */
#videoCover {
  position: fixed;
  inset: 0;
  background: #fdf6ee;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.6s ease;
}

.intro-loader {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.loader-logo {
  width: 120px;
  margin-bottom: 16px;
}

#introLoaderText {
  color: #4a3728;
  margin-bottom: 12px;
  font-size: 0.95rem;
}

.loader-bar {
  width: 200px;
  height: 5px;
  background: #f5e8d3;
  border-radius: 10px;
  overflow: hidden;
}

#introProgress {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--brand-pink), var(--brand-blue));
  transition: width 0.2s ease;
}


  </style>

  <script>
  if (sessionStorage.getItem("seenIntro") === "true") {
    window.location.href = "home.html";
  }
</script>
</head>


<body>
  <div id="videoCover">
  <div class="intro-loader">
    <img src="assets/logo.png" class="loader-logo" />

    <p id="introLoaderText">Starting the oven…</p>

    <div class="loader-bar">
      <div id="introProgress"></div>
    </div>
  </div>
</div>

  <!-- VIDEO -->
  <video autoplay muted loop playsinline preload="auto" class="video-bg">
    <source src="assets/bg.mp4" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- CONTENT -->
  <div class="content">
      <img src="assets/logo.png" alt="Bake Bae Logo" class="logo">

    <h1>BAKE BAE</h1>
    <p>Something Sweet For All</p>
    

    <button class="enter-btn" id="enterBtn">ENTER</button>
  </div>

<a href="https://instagram.com/elevate.edge__" target="_blank" class="credit">
  <img src="assets/elevate-logo.png" alt="Elevate Edge Logo">
  <span>Crafted by Elevate Edge</span>
</a>
</div>
  <script>
    const btn = document.getElementById("enterBtn");

    // show after 3 seconds
    setTimeout(() => {
      btn.classList.add("show");
    }, 2000);

   btn.addEventListener("click", () => {
  document.body.classList.add("fade-out");

  // small delay for smooth transition
  setTimeout(() => {
    window.location.href = "home.html";
  }, 1200);
});
const video = document.querySelector(".video-bg");
const cover = document.getElementById("videoCover");

const introProgress = document.getElementById("introProgress");
const introText = document.getElementById("introLoaderText");

let introVal = 0;

// fake smooth progress
const introInterval = setInterval(() => {
  if (introVal < 90) {
    introVal += Math.random() * 5;
    introProgress.style.width = introVal + "%";

    if (introVal < 30) introText.textContent = "Starting the oven…";
    else if (introVal < 60) introText.textContent = "Mixing ingredients…";
    else introText.textContent = "Almost ready…";
  }
}, 120);

// real completion (correct event)
video.addEventListener("canplaythrough", () => {
  clearInterval(introInterval);

  introProgress.style.width = "100%";
  introText.textContent = "Ready!";

  setTimeout(() => {
    cover.style.opacity = "0";

    setTimeout(() => {
      cover.remove();
    }, 600);

  }, 400);
});

  </script>

</body>
</html>
