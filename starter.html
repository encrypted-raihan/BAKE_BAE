<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bake Bae</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
      

body {
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

/* MAIN BRAND */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 8vw, 5rem);
  letter-spacing: 3px;
}

/* SUBTEXT */
p {
  margin-top: 12px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  letter-spacing: 1px;
  opacity: 0.9;
}
    /* ===== VIDEO ===== */
.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;

  /* lightweight styling instead of heavy blur */
  filter: brightness(0.6) contrast(1.1);
  transform: scale(1.05);
  will-change: transform;
}


body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;

  background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.15;
}
.overlay {
  position: fixed;
  inset: 0;

  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.55)),
    radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.8));

  z-index: -1;
}
    /* ===== CONTENT ===== */
    .content {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 20px;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 5rem);
      letter-spacing: 4px;
    }

    p {
      margin-top: 10px;
      font-size: 1.2rem;
      opacity: 0.85;
    }

    /* ===== BUTTON ===== */
    .enter-btn {
      margin-top: 30px;
      padding: 12px 28px;
      border: 2px solid #fff;
      border-radius: 50px;
      background: transparent;
      color: #fff;
      font-size: 0.95rem;
      letter-spacing: 2px;
      cursor: pointer;

      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }
.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;

  /* stronger soft look WITHOUT heavy blur */
  filter: brightness(0.5) contrast(1.15) saturate(0.9);
  transform: scale(1.08);
  will-change: transform;

  opacity: 0;
  transition: opacity 1s ease;
}
.video-bg.loaded {
  opacity: 1;
}

    .enter-btn.show {
      opacity: 1;
      transform: translateY(0);
    }

    .enter-btn:hover {
      background: #fff;
      color: #000;
    }

    .content h1,
.content p {
  animation: fadeIn 1.2s ease;
}
    /* ===== ANIMATION ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <!-- VIDEO -->
  <video autoplay muted loop playsinline preload="auto" class="video-bg">
    <source src="assets/bg.mp4" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- CONTENT -->
  <div class="content">
    <h1>BAKE BAE</h1>
    <p>Something Sweet For All</p>

    <button class="enter-btn" id="enterBtn">ENTER</button>
  </div>

  <script>
    const btn = document.getElementById("enterBtn");

    // show after 3 seconds
    setTimeout(() => {
      btn.classList.add("show");
    }, 1000);

    // click action
    btn.addEventListener("click", () => {
      window.location.href = "index.html";
    });
    const video = document.querySelector(".video-bg");

video.addEventListener("canplay", () => {
  video.classList.add("loaded");
});
  </script>

</body>
</html>
